<script>
// ══════════════════════════════════════════════════════════
// КОНФИГ SUPABASE — вставь свои значения из Settings → API
// ══════════════════════════════════════════════════════════
const SUPABASE_URL = 'https://dytcthyberbwhnyyiadg.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_3QODxySfDKW_6xxbfku02Q_VLl9sD1s';
const ADMIN_EMAIL = 'admin@tarabarshina.ru'; // email аккаунта-администратора
// ══════════════════════════════════════════════════════════

// Используем упрощённую инициализацию без автоматического отслеживания блокировок
const { createClient } = window.supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: {
    storage: window.localStorage,
    autoRefreshToken: true,
    persistSession: true,
    detectSessionInUrl: true

// ═══ ТГ-СОВМЕСТИМЫЕ ДИАЛОГИ ══════════════════
(function(){
  const tg = window.Telegram && window.Telegram.WebApp;
  if(!tg) return;
  window._tgAlert = function(msg){ try{ tg.showAlert(msg); }catch(e){ console.warn(msg); } };
  window._tgConfirm = function(msg, cb){ try{ tg.showConfirm(msg, cb); }catch(e){ cb(window.confirm(msg)); } };
})();
function _alert(msg){ if(window._tgAlert){ window._tgAlert(msg); } else { alert(msg); } }
function _confirm(msg){ return window.confirm(msg); }
function _confirmAsync(msg, cb){
  if(window._tgConfirm){ window._tgConfirm(msg, cb); }
  else { cb(confirm(msg)); }
}

// Безопасное закрытие модалки (может быть вызвано до загрузки DOM)
function safeCloseAuthModal() {
  const modal = document.getElementById('auth-modal');
  if (modal) modal.classList.remove('active');
}

// ═══ СОСТОЯНИЕ ════════════════════════════════
const _cache = { users: {}, comments: {} };
let currentUser = null, currentBookId = null, currentChapIdx = 0;
let editingChapterId = null, editingBookId = null, editingBlogId = null;
const _navStack = [];

// Realtime каналы
let _commentsChannel = null;
let _notifChannel = null;
let _replyTo = null;

// Предотвращение параллельной загрузки данных
let _loadingData = false;
let _dataLoaded = false;

// ═══ НАСТРОЙКИ РИДЕРА ════════════════════════
let RS = { fontSize: 18, lineHeight: 2.05, fontFamily: 'serif' };
try {
  const s = JSON.parse(localStorage.getItem('rs') || '{}');
  Object.assign(RS, s);
} catch (e) {}

// ═══ УТИЛИТЫ ═════════════════════════════════
function esc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function showMsg(el, txt, type) {
  if (!el) return;
  el.innerHTML = '<div class="msg ' + type + '">' + txt + '</div>';
  setTimeout(() => { if (el) el.innerHTML = ''; }, 4000);
}
function getData(k, d) {
  return k in _cache ? _cache[k] : d;
}

function getChapters(bookId) {
  const chapters = getData('chapters', []);
  const arr = chapters.filter(c => String(c.book_id) === String(bookId));
  return arr.sort((a, b) => (a.order || 0) - (b.order || 0));
}

// ═══ ЗАГРУЗКА ДАННЫХ (с защитой от параллельных вызовов) ═════════════════════════
let _firstLoad = true;
async function loadSiteData(force = false) {
  if (_loadingData) return;
  _loadingData = true;
  
  try {
    const cached = localStorage.getItem('_siteCache');
    if (cached && !force) {
      const val = JSON.parse(cached);
      Object.assign(_cache, val);
      if (document.readyState === 'complete') {
        renderWorksGrid();
        renderBlogPosts();
        applyTexts();
        renderSaved();
      }
      hideLoading();
    }

    // Параллельная загрузка из Supabase с защитой от ошибок
    const [booksRes, chaptersRes, postsRes] = await Promise.allSettled([
      sb.from('books').select('*').order('id'),
      sb.from('chapters').select('id,book_id,title,img,order,date').order('order'),
      sb.from('blog_posts').select('*').order('id', { ascending: false }),
    ]);

    if (booksRes.status === 'fulfilled' && !booksRes.value.error) _cache['books'] = booksRes.value.data;
    else console.warn('books load failed', booksRes.reason || booksRes.value?.error);
    
    if (chaptersRes.status === 'fulfilled' && !chaptersRes.value.error) _cache['chapters'] = chaptersRes.value.data;
    else console.warn('chapters load failed', chaptersRes.reason || chaptersRes.value?.error);
    
    if (postsRes.status === 'fulfilled' && !postsRes.value.error) _cache['blog_posts'] = postsRes.value.data;
    else console.warn('blog_posts load failed', postsRes.reason || postsRes.value?.error);

    // Тексты сайта
    const textsRes = await sb.from('site_texts').select('*').limit(1).maybeSingle();
    if (textsRes.data) {
      _cache['home_quote'] = textsRes.data.home_quote || '«Если тебе трудно читать — значит, переводчик плохо поработал»';
      _cache['home_desc'] = textsRes.data.home_desc || 'Здесь я публикую любительские переводы китайских новелл.';
      _cache['about_p1'] = textsRes.data.about_p1 || 'Привет! Я — автор проекта «Китайская тарабарщина».';
      _cache['about_p2'] = textsRes.data.about_p2 || 'Перевожу новеллы любимых авторов. Все переводы бесплатны.';
    }

    if (!_cache['comments']) _cache['comments'] = {};
    if (!_cache['users']) _cache['users'] = {};

    try {
      localStorage.setItem('_siteCache', JSON.stringify({
        books: _cache['books'],
        chapters: _cache['chapters'],
        blog_posts: _cache['blog_posts'],
        home_quote: _cache['home_quote'],
        home_desc: _cache['home_desc'],
        about_p1: _cache['about_p1'],
        about_p2: _cache['about_p2'],
      }));
    } catch (_) {}

    if (document.readyState === 'complete') {
      renderWorksGrid();
      renderBlogPosts();
      applyTexts();
      renderSaved();
    }
    
    if (document.getElementById('page-admin')?.classList.contains('active')) {
      renderAdminChapters();
      renderAdminBooks();
      renderAdminBlogList();
      renderAdminComments();
    }
    if (document.getElementById('page-book')?.classList.contains('active') && currentBookId !== null) {
      renderChaptersList(currentBookId);
    }
    
    _dataLoaded = true;
  } catch (err) {
    console.error('Supabase load error:', err);
  } finally {
    _loadingData = false;
    if (_firstLoad) {
      _firstLoad = false;
      hideLoading();
    }
  }
}

// ═══ ЗАГРУЗКА ЭКРАНА ══════════════════════════
const _loadStart = Date.now();
function hideLoading() {
  const el = document.getElementById('loading-screen');
  if (!el || el._hiding) return;
  el._hiding = true;
  el.style.animation = 'none';
  const elapsed = Date.now() - _loadStart;
  const delay = Math.max(0, 300 - elapsed);
  setTimeout(() => {
    if (!el) return;
    el.style.transition = 'opacity 0.5s ease';
    el.style.opacity = '0';
    el.style.pointerEvents = 'none';
    setTimeout(() => {
      if (el.parentNode) el.parentNode.removeChild(el);
    }, 550);
  }, delay);
}
(function(){
  const phrases = ['Открываем свиток...', 'Листаем страницы...', 'Загружаем переводы...', 'Почти готово...', '故事已开始...'];
  let i = 0;
  const iv = setInterval(() => {
    i++;
    const el = document.getElementById('ls-status-text');
    if (!el) { clearInterval(iv); return; }
    if (i < phrases.length) {
      el.style.opacity = '0';
      setTimeout(() => { el.textContent = phrases[i]; el.style.opacity = '1'; }, 200);
    } else {
      clearInterval(iv);
    }
  }, 1100);
})();

// ═══ AUTH ══════════════════════════════════════
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-password').value;
  const msg = document.getElementById('login-msg');
  if (!email || !pass) { showMsg(msg, 'Заполните все поля.', 'error'); return; }
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) showMsg(msg, (error.message.includes('Invalid') || error.message.includes('invalid')) ? 'Неверный email или пароль.' : 'Ошибка: ' + error.message, 'error');
}
async function doForgotPassword() {
  const email = document.getElementById('login-email').value.trim();
  const msg = document.getElementById('forgot-msg');
  if (!email) { msg.innerHTML = '<span style="color:var(--red);font-size:0.88rem">Введите email выше.</span>'; return; }
  const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + window.location.pathname + '?mode=resetPassword' });
  if (error) msg.innerHTML = '<span style="color:var(--red);font-size:0.88rem">Ошибка: ' + error.message + '</span>';
  else msg.innerHTML = '<span style="color:var(--success);font-size:0.88rem">Письмо отправлено! Проверьте почту.</span>';
}
async function doRegister() {
  const nick = document.getElementById('reg-nickname').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-password').value;
  const msg = document.getElementById('register-msg');
  if (!nick || !email || !pass) { showMsg(msg, 'Заполните все поля.', 'error'); return; }
  if (pass.length < 6) { showMsg(msg, 'Пароль — минимум 6 символов.', 'error'); return; }
  const { data, error } = await sb.auth.signUp({ email, password: pass, options: { data: { nickname: nick } } });
  if (error) {
    showMsg(msg, error.message.includes('already') ? 'Email уже зарегистрирован.' : 'Ошибка: ' + error.message, 'error');
    return;
  }
  if (data.user) {
    await sb.from('users').upsert({ id: data.user.id, email, nickname: nick, role: 'user', banned: false });
    showMsg(msg, 'Аккаунт создан! Проверьте email для подтверждения.', 'success');
  }
}
async function logout() {
  if (_commentsChannel) sb.removeChannel(_commentsChannel);
  if (_notifChannel) sb.removeChannel(_notifChannel);
  _commentsChannel = null;
  _notifChannel = null;

  await sb.auth.signOut();

  showAdminBars(false);

  const fbtn = document.getElementById('forum-new-btn');
  if (fbtn) fbtn.style.display = 'none';
  showPage('main');
  showSection('home');

// Слушаем изменения сессии (вызывается после DOMContentLoaded)
function initAuthListener() {
  sb.auth.onAuthStateChange(async (event, session) => {
    if (document.readyState !== 'complete') {
      await new Promise(resolve => { window.addEventListener('load', resolve, { once: true }); });
    }

    if (session && session.user) {
      const u = session.user;
      const { data: profile } = await sb.from('users').select('*').eq('id', u.id).maybeSingle();
      if (profile && profile.banned) {
        await sb.auth.signOut();
        _alert('Ваш аккаунт заблокирован.');
        return;
      }
      const isAdmin = u.email === ADMIN_EMAIL || (profile && profile.role === 'admin');
      currentUser = {
        uid: u.id,
        email: u.email,
        nickname: profile ? profile.nickname : (u.user_metadata?.nickname || u.email),
        role: isAdmin ? 'admin' : (profile ? profile.role : 'user'),
        avatar: profile ? profile.avatar : null,
      };
      if (profile && profile.saved) _cache['saved_' + currentUser.uid] = profile.saved || [];
      if (profile && profile.read_progress) _cache['rp'] = profile.read_progress || {};
      safeCloseAuthModal();
      renderNav();
      showAdminBars(currentUser.role === 'admin');
      // Не вызываем loadSiteData при каждом изменении, чтобы избежать гонок
      if (!_dataLoaded) await loadSiteData();
      else {
        renderWorksGrid();
        renderBlogPosts();
        renderSaved();
      }
      loadNotifs();
      subscribeChapterNotifs();
      const fbtn = document.getElementById('forum-new-btn');
      if (fbtn) fbtn.style.display = '';
    } else {
      currentUser = null;
      renderNav();
      showAdminBars(false);
      renderWorksGrid();
      renderBlogPosts();
      renderSaved();
      const fbtn = document.getElementById('forum-new-btn');
      if (fbtn) fbtn.style.display = 'none';
    }
  });
}

// ═══ ПРОГРЕСС ЧТЕНИЯ ══════════════════════════
function getRP() { return _cache['rp'] || {}; }
async function markRead(bookId, chapIdx) {
  if (!currentUser) return;
  const rp = getRP();
  if (!rp[bookId] || rp[bookId] < chapIdx + 1) rp[bookId] = chapIdx + 1;
  _cache['rp'] = rp;
  await sb.from('users').update({ read_progress: rp }).eq('id', currentUser.uid);
}
function bookProgress(bookId) {
  const total = getChapters(bookId).length;
  const read = Math.min(getRP()[bookId] || 0, total);
  const done = read;
  return { done, read, total, pct: total ? Math.round(read / total * 100) : 0 };
}

// ═══ БЕЙДЖ «НОВАЯ» ═══════════════════════════
function isNew(ch) {
  if (!ch || !ch.date) return false;
  const mo = { 'января': 0, 'февраля': 1, 'марта': 2, 'апреля': 3, 'мая': 4, 'июня': 5, 'июля': 6, 'августа': 7, 'сентября': 8, 'октября': 9, 'ноября': 10, 'декабря': 11 };
  const p = ch.date.trim().split(' ');
  if (p.length < 3) return false;
  const d = new Date(+p[2], mo[p[1]], +p[0]);
  return !isNaN(d) && (Date.now() - d) < 7 * 24 * 3600 * 1000;
}

// ═══ АВАТАРКИ ════════════════════════════════
async function loadUserAvatar(uid) {
  if (!uid) return null;
  if (_cache['users'] && _cache['users'][uid]) return _cache['users'][uid].avatar || null;
  const { data } = await sb.from('users').select('avatar').eq('id', uid).maybeSingle();
  const av = data ? data.avatar : null;
  _cache['users'][uid] = { avatar: av };
  return av;
}

function renderProfile() {
  if (!currentUser) { showPage('main'); return; }
  document.getElementById('profile-email').value = currentUser.email;
  document.getElementById('profile-nickname').value = currentUser.nickname || '';
  document.getElementById('profile-password').value = '';

async function saveProfile() {
  const nick = document.getElementById('profile-nickname').value.trim();
  const pass = document.getElementById('profile-password').value;
  const msg = document.getElementById('profile-msg');
  if (!nick) { showMsg(msg, 'Никнейм не может быть пустым.', 'error'); return; }
  currentUser.nickname = nick;
  const { error } = await sb.from('users').update({ nickname: nick }).eq('id', currentUser.uid);

  if (pass) {
    if (pass.length < 6) { showMsg(msg, 'Минимум 6 символов.', 'error'); return; }
    const { error: pe } = await sb.auth.updateUser({ password: pass });
    if (pe) { showMsg(msg, 'Ошибка смены пароля: ' + pe.message, 'error'); return; }
  }
  renderNav();
  showMsg(msg, 'Сохранено!', 'success');
}
async function handleAvatarUpload(e) {
  const f = e.target.files[0];
  if (!f) return;
  if (!currentUser) return;
  try {
    const compressed = await compressImage(f, 256);
    const ext = f.name.split('.').pop() || 'jpg';
    const path = currentUser.uid + '/avatar.' + ext;
    const { error: upErr } = await sb.storage.from('avatars').upload(path, compressed, { upsert: true, contentType: f.type });
    if (upErr) throw upErr;
    const { data: urlData } = sb.storage.from('avatars').getPublicUrl(path);
    const avatarUrl = urlData.publicUrl + '?t=' + Date.now();
    currentUser.avatar = avatarUrl;
    await sb.from('users').update({ avatar: avatarUrl }).eq('id', currentUser.uid);
    renderProfile();
    renderNav();
  } catch (err) {
    alert('Ошибка загрузки аватара: ' + err.message);
  }
}

function compressImage(file, maxSize) {
  return new Promise((resolve) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > h) { if (w > maxSize) { h = h * (maxSize / w); w = maxSize; } }
      else { if (h > maxSize) { w = w * (maxSize / h); h = maxSize; } }
      canvas.width = w;
      canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      canvas.toBlob(resolve, 'image/jpeg', 0.85);
    };
    img.src = url;
  });
}

// ═══ READER SETTINGS ══════════════════════════
function applyRS() {
  const c = document.getElementById('chapter-content');
  if (!c) return;
  c.style.fontSize = RS.fontSize + 'px';
  c.style.lineHeight = RS.lineHeight;
  c.style.fontFamily = RS.fontFamily === 'sans' ? 'Arial,Helvetica,sans-serif' : 'EB Garamond,Georgia,serif';
  c.querySelectorAll('p').forEach(p => { p.style.fontSize = RS.fontSize + 'px'; p.style.lineHeight = RS.lineHeight; });
  try { localStorage.setItem('rs', JSON.stringify(RS)); } catch (_) {}
  document.querySelectorAll('[data-rs-lh]').forEach(b => b.classList.toggle('on', parseFloat(b.getAttribute('data-rs-lh')) === RS.lineHeight));
  document.querySelectorAll('[data-rs-ff]').forEach(b => b.classList.toggle('on', b.getAttribute('data-rs-ff') === RS.fontFamily));
  const fv = document.getElementById('rs-fv');
  if (fv) fv.textContent = RS.fontSize + 'px';
}
function rsSize(d) { RS.fontSize = Math.min(36, Math.max(14, RS.fontSize + d)); applyRS(); }
function rsLH(v) { RS.lineHeight = v; applyRS(); }
function rsFF(v) { RS.fontFamily = v; applyRS(); }

// ═══ CHAPTER READER ═══════════════════════════
async function openChapter(bookId, chapIdx) {
  currentBookId = bookId;
  currentChapIdx = chapIdx;
  const b = getData('books', []).find(x => x.id === bookId);
  const chs = getChapters(bookId);
  const ch = chs[chapIdx];
  if (!ch) return;
  const isAdmin = currentUser && currentUser.role === 'admin';

  markRead(bookId, chapIdx);

  document.getElementById('chapter-header').innerHTML =
    '<button class="btn-plain" onclick="goBack()" style="margin-bottom:16px">← К списку глав</button>' +
    '<div class="section-tag">' + esc(b ? b.title : '') + '</div>' +
    '<h2>' + esc(ch.title) + '</h2>' +
    '<p style="font-size:0.82rem;color:var(--muted)">' + (ch.date || '') + '</p>' +
    (isAdmin ? '<button class="btn-plain" style="margin-top:8px" onclick="adminEditChapterFromReader(' + bookId + ',' + chapIdx + ')">✎ Редактировать</button>' : '') +
    '<div class="reader-toolbar">' +
      '<span class="rtb-label">Шрифт</span>' +
      '<div class="rtb-group">' +
        '<button class="rtb-btn" onclick="rsSize(-1)">A−</button>' +
        '<span class="rtb-val" id="rs-fv">' + RS.fontSize + 'px</span>' +
        '<button class="rtb-btn" onclick="rsSize(+1)">A+</button>' +
      '</div>' +
      '<div class="rtb-group">' +
        '<button class="rtb-btn" data-rs-ff="serif" onclick="rsFF(\'serif\')">С засечками</button>' +
        '<button class="rtb-btn" data-rs-ff="sans" onclick="rsFF(\'sans\')">Без засечек</button>' +
      '</div>' +
      '<span class="rtb-label">Интервал</span>' +
      '<div class="rtb-group">' +
        '<button class="rtb-btn" data-rs-lh="1.6" onclick="rsLH(1.6)">Сжатый</button>' +
        '<button class="rtb-btn" data-rs-lh="2.05" onclick="rsLH(2.05)">Обычный</button>' +
        '<button class="rtb-btn" data-rs-lh="2.5" onclick="rsLH(2.5)">Широкий</button>' +
      '</div>' +
    '</div>';

  document.getElementById('chapter-content').innerHTML = '<p style="color:var(--muted)">Загрузка...</p>';
  const { data: chFull } = await sb.from('chapters').select('text,img').eq('id', ch.id).maybeSingle();
  const fullText = chFull?.text || '';
  const imgHtml = chFull && chFull.img ? '<img src="' + esc(chFull.img) + '" class="chapter-img" alt="">' : '';
  const chapterHtml = fullText
    .split('\n\n')
    .map(p => {
      const trimmed = p.trim();
      if (!trimmed) return '';
      return '<p>' + esc(trimmed).replace(/\n/g, '<br>') + '</p>';
    })
    .filter(Boolean)
    .join('');
  document.getElementById('chapter-content').innerHTML = imgHtml + chapterHtml;
  applyRS();

  const nav = document.getElementById('chapter-nav');
  nav.innerHTML =
    (chapIdx > 0 ? '<button class="btn-plain" onclick="openChapter(' + bookId + ',' + (chapIdx - 1) + ')">← Предыдущая</button>' : '<span></span>') +
    (chapIdx < chs.length - 1 ? '<button class="btn-plain filled" onclick="openChapter(' + bookId + ',' + (chapIdx + 1) + ')">Следующая →</button>' : '');

  const key = bookId + '_' + ch.id;
  loadCommentsForChapter(key, bookId, ch.id);
  renderReactions(String(ch.id));
  const chPage = document.getElementById('page-chapter');
  if (!chPage || !chPage.classList.contains('active')) {
    _navStack.push({ type: 'book', bookId });
  }
  try { history.pushState({ page: 'chapter', bookId, chapIdx }, ''); } catch (_) {}
  showPageRaw('chapter');
}

// ═══ НАВИГАЦИЯ ════════════════════════════════
let _appReady = false;
function showPageRaw(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const target = document.getElementById('page-' + name);
  if (target) target.classList.add('active');
  window.scrollTo(0, 0);
  closeBurger();
  if (_appReady && name !== 'chapter' && name !== 'book' && name !== 'forum-thread') try { history.pushState({ page: name, idx: _navStack.length }, ''); } catch (_) {}
}
function showPage(name) {
  _navStack.length = 0;
  showPageRaw(name);
  try { history.pushState({ page: name, idx: 0 }, ''); } catch (_) {}
}
function goBack() {
  const prev = _navStack.pop();
  if (!prev) { showPage('main'); return; }
  if (prev.type === 'saved') {
    unsubForumPosts();
    showPageRaw('main');
    showSection('forum');
    return;
  }
  if (prev.type === 'main') {
    showPageRaw('main');
  } else if (prev.type === 'book') {
    const bookId = prev.bookId || currentBookId;
    const b = getData('books', []).find(x => x.id === bookId);
    if (!b) return showPageRaw('main');
    const isAdmin = currentUser && currentUser.role === 'admin';
    document.getElementById('book-detail-header').innerHTML =
      '<button class="btn-plain" onclick="goBack()" style="margin-bottom:16px">← Назад</button>' +
      '<div class="section-tag">Произведение</div><h2>' + esc(b.title) + '</h2>' +
      '<p style="color:var(--muted);font-style:italic">' + esc(b.author) + '</p>' +
      (isAdmin ? '<button class="btn-plain" style="margin-top:10px" onclick="showPage(\'admin\');initAdminPage();switchAdminTab(\'chapters\')">+ Добавить главу</button>' : '');
    renderChaptersList(bookId);
    showPageRaw('book');
  } else {
    showPageRaw('main');
  }
}
function showSection(sec) {
  _navStack.length = 0;
  showPageRaw('main');
  document.querySelectorAll('#nav-main-links a').forEach(a => a.classList.remove('active'));
  const el = document.getElementById('nav-' + sec);
  if (el) el.classList.add('active');
  const target = document.getElementById('sec-' + sec);
  if (target) setTimeout(() => { try { target.scrollIntoView({ behavior: 'smooth' }); } catch (_) { target.scrollIntoView(); } }, 50);
  if (sec === 'forum') renderForumThreads();
}

// ═══ КОММЕНТАРИИ ══════════════════════════════
function renderComments(bookId, chapId) {
  const key = bookId + '_' + chapId;
  const isAdmin = currentUser && currentUser.role === 'admin';
  const wrap = document.getElementById('chapter-comments');
  if (!wrap) return;
  const coms = getData('comments', {})[key] || [];
  let html = '<div class="section-tag" style="margin-bottom:16px">Комментарии</div>';
  html += coms.length ? coms.map(c => {
    const isComAdmin = (c.is_admin === true);
    const comAvatar = c.avatar || (_cache['users'] && c.uid && _cache['users'][c.uid] && _cache['users'][c.uid].avatar) || null;
    const replyHtml = c.reply_to_nickname ?
      '<div class="comment-reply-quote"><div class="rq-author">↩ ' + esc(c.reply_to_nickname) + '</div><div>' + esc((c.reply_to_text || '').slice(0, 80)) + ((c.reply_to_text || '').length > 80 ? '…' : '') + '</div></div>' : '';
    const canDel = isAdmin || (currentUser && currentUser.uid === c.uid);
    const replyBtn = currentUser ? '<button class="comment-reply-btn" onclick="startReply(\'' + key + '\',\'' + c.id + '\',\'' + encodeURIComponent(c.nickname) + '\',\'' + encodeURIComponent(c.text.slice(0, 80)) + '\')">↩ Ответить</button>' : '';
    return '<div class="comment" id="com-' + c.id + '">' +
      '<div class="comment-avatar">' + (comAvatar ? '<img src="' + esc(comAvatar) + '">' : esc((c.nickname || '?')[0])) + '</div>' +
      '<div class="comment-body"><div class="comment-meta">' +
        '<span class="comment-author' + (isComAdmin ? ' comment-author-admin' : '') + '">' + esc(c.nickname || 'Аноним') + '</span>' +
        (isComAdmin ? '<span class="comment-admin-badge">Админ</span>' : '') +
        '<span class="comment-time">' + (c.date || '') + '</span>' +
        (canDel ? '<button class="comment-del" onclick="deleteComment(\'' + key + '\',\'' + c.id + '\')">✕</button>' : '') +
      '</div>' + replyHtml + '<div class="comment-text">' + esc(c.text) + '</div>' + replyBtn + '</div></div>';
  }).join('') : '<p style="color:var(--muted);margin-bottom:20px">Комментариев пока нет.</p>';
  if (currentUser) {
    html += '<div style="margin-top:20px" id="comment-form-wrap">' +
      '<div id="reply-indicator" style="display:none" class="reply-form">' +
        '<span style="font-size:0.85rem;color:var(--muted)">Ответ: <strong id="reply-to-name"></strong></span>' +

      '<div class="form-group"><label>Комментарий</label><textarea id="comment-input" style="min-height:80px" placeholder="Напишите что-нибудь..."></textarea></div>' +

  const { data } = await sb.from('comments').select('*').eq('chapter_key', key).order('created_at');
  _cache['comments'][key] = data || [];
  renderComments(bookId, chapId);
  _commentsChannel = sb.channel('comments-' + key)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'comments', filter: 'chapter_key=eq.' + key },
      async () => {

    ).subscribe();
}

// DOCX IMPORT
let _docxParsed = [];
function previewDocxImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('docx-filename').textContent = file.name;
  const reader = new FileReader();
  reader.onload = ev => {
    mammoth.convertToHtml({ arrayBuffer: ev.target.result }).then(result => {
      const htmlDoc = result.value;
      const tmp = document.createElement('div');
      tmp.innerHTML = htmlDoc;
      const nodes = [...tmp.childNodes];
      _docxParsed = [];
      let current = null;
      nodes.forEach(node => {
        const tag = (node.tagName || '').toLowerCase();
        if (tag === 'h1' || tag === 'h2' || tag === 'h3') {
          if (current && current.text.trim()) _docxParsed.push(current);
          current = { title: node.textContent.trim(), text: '' };
        } else if (current) {
          const clone = node.cloneNode(true);
          clone.querySelectorAll && clone.querySelectorAll('br').forEach(br => br.replaceWith('\n'));
          const t = clone.textContent.trim();
          if (t) current.text += (current.text ? '\n\n' : '') + t;
        }
      });
      if (current && current.text.trim()) _docxParsed.push(current);
      renderDocxPreview();
    }).catch(err => { document.getElementById('docx-filename').textContent = 'Ошибка: ' + err.message; });
  };
  reader.readAsArrayBuffer(file);
}
function renderDocxPreview() {
  const wrap = document.getElementById('docx-preview-wrap');
  const preview = document.getElementById('docx-chapters-preview');
  if (!_docxParsed.length) {
    preview.innerHTML = '<p style="color:var(--muted)">Заголовков не найдено.</p>';
  } else {
    preview.innerHTML = _docxParsed.map((ch, i) =>
      '<div style="padding:10px 0;border-bottom:1px solid var(--divider)">' +
      '<div style="font-weight:bold;color:var(--red);margin-bottom:4px">Глава ' + (i + 1) + ': ' + esc(ch.title) + '</div>' +
      '<div style="color:var(--muted);font-size:0.82rem;white-space:pre-wrap;max-height:80px;overflow:hidden">' + esc(ch.text.slice(0, 200)) + (ch.text.length > 200 ? '…' : '') + '</div>' +
      '</div>'
    ).join('');
  }
  wrap.style.display = _docxParsed.length ? '' : 'none';
}
async function importDocxChapters() {
  if (!_docxParsed.length) return;
  const bookSel = document.getElementById('admin-chapter-book');
  const bookId = parseInt(bookSel.value);
  const msg = document.getElementById('docx-import-msg');
  if (!bookId || isNaN(bookId)) { showMsg(msg, '⚠ Сначала выберите произведение!', 'error'); return; }
  const existing = getChapters(bookId);
  const maxOrder = existing.length ? Math.max(...existing.map(c => c.order || 0)) : 0;
  const dateStr = new Date().toLocaleDateString('ru-RU', { day: '2-digit', month: 'long', year: 'numeric' });
  const newChaps = _docxParsed.map((ch, i) => ({
    book_id: bookId, title: ch.title, text: ch.text, img: null,
    order: maxOrder + i + 1, date: dateStr
  }));
  const { data: insertedChaps, error } = await sb.from('chapters').insert(newChaps).select('id,book_id,title,img,order,date');
  if (!error && insertedChaps) {
    const chs = getData('chapters', []);
    _cache['chapters'] = [...chs, ...insertedChaps];
    showMsg(msg, 'Импортировано ' + newChaps.length + ' глав!', 'success');
    renderAdminChapters();
    if (currentBookId === bookId) renderChaptersList(bookId);
    cancelDocxImport();
  } else showMsg(msg, 'Ошибка: ' + error.message, 'error');
}
function cancelDocxImport() {
  _docxParsed = [];
  document.getElementById('docx-preview-wrap').style.display = 'none';
  document.getElementById('docx-filename').textContent = '';
  document.getElementById('docx-import-input').value = '';
}

function renderForumCompose(el, threadId) {
  if (!currentUser) { el.innerHTML = '<div class="locked-notice">Чтобы писать, <a onclick="openAuthModal(\'login\')">войдите</a>.</div>'; return; }
  el.innerHTML = '<div class="forum-compose">' +
    '<textarea id="forum-reply-inp" placeholder="Написать сообщение..."></textarea>' +
    '<div id="forum-reply-attach-preview" class="forum-attach-preview"></div>' +
    '<div class="forum-compose-actions">' +
      '<button class="btn-plain filled" onclick="submitForumPost(\'' + threadId + '\')">Отправить</button>' +
      '<label class="forum-attach-btn" style="cursor:pointer">📎 Прикрепить<input type="file" id="forum-reply-file-inp" multiple accept="image/*" style="display:none" onchange="forumPreviewAttach(\'reply\',event)"></label>' +
    '</div></div>';
}

function forumPreviewAttach(slot, e) {
  const files = [...e.target.files];
  _forumAttachFiles[slot] = (_forumAttachFiles[slot] || []).concat(files);
  const previewId = slot === 'new' ? 'forum-new-attach-preview' : 'forum-reply-attach-preview';
  const wrap = document.getElementById(previewId);
  if (!wrap) return;
  wrap.innerHTML = '';
  _forumAttachFiles[slot].forEach((f, i) => {
    const item = document.createElement('div');
    item.className = 'forum-attach-item';
    if (f.type.startsWith('image/')) { const img = document.createElement('img'); img.src = URL.createObjectURL(f); item.appendChild(img); }
    else { item.innerHTML = '<div style="padding:8px;font-size:0.78rem;color:var(--muted)">' + esc(f.name) + '</div>'; }
    const rm = document.createElement('button');
    rm.className = 'rm';
    rm.textContent = '✕';
    rm.onclick = () => { _forumAttachFiles[slot].splice(i, 1); forumPreviewAttach(slot, { target: { files: [] } }); };
    item.appendChild(rm);
    wrap.appendChild(item);
  });
}
function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = () => rej(new Error('Ошибка'));
    r.readAsDataURL(file);
  });
}
const MAX_FILE_MB = 1.5;
async function uploadForumFiles(slot) {
  const files = _forumAttachFiles[slot] || [];
  if (!files.length) return [];
  const media = [];
  for (const f of files) {
    if (f.size > MAX_FILE_MB * 1024 * 1024) { _alert('Файл «' + f.name + '» слишком большой.'); continue; }
    const b64 = await fileToBase64(f);
    media.push({ url: b64, type: f.type.startsWith('image/') ? 'image' : 'file', name: f.name });
  }
  _forumAttachFiles[slot] = [];
  return media;
}

(function(){
  let _tx = 0, _ty = 0;
  document.addEventListener('touchstart', e => { if (e.touches.length !== 1) return; _tx = e.touches[0].clientX; _ty = e.touches[0].clientY; }, { passive: true });
  document.addEventListener('touchend', e => {
    if (e.changedTouches.length !== 1) return;
    const dx = e.changedTouches[0].clientX - _tx;
    const dy = e.changedTouches[0].clientY - _ty;
    if (Math.abs(dx) < 60 || Math.abs(dx) < Math.abs(dy)) return;
    const chPage = document.getElementById('page-chapter');
    if (!chPage || !chPage.classList.contains('active')) return;
    const chs = getChapters(currentBookId);
    if (dx < 0) { if (currentChapIdx < chs.length - 1) openChapter(currentBookId, currentChapIdx + 1); }
    else { if (currentChapIdx > 0) openChapter(currentBookId, currentChapIdx - 1); else goBack(); }
  }, { passive: true });
})();

let _searchTimer = null;
function doSearch(q) {
  q = q.trim();
  const clear = document.getElementById('search-clear');
  const res = document.getElementById('search-results');
  if (clear) clear.style.display = q ? '' : 'none';
  clearTimeout(_searchTimer);
  if (!q) { res.style.display = 'none'; return; }
  _searchTimer = setTimeout(() => {
    const books = getData('books', []);
    const posts = getData('blog_posts', []);
    let items = [];
    books.forEach(b => {
      if (b.title && b.title.toLowerCase().includes(q.toLowerCase()))
        items.push({ type: 'book', icon: '📖', label: b.title, sub: b.author || '', action: 'openBookModal(' + b.id + ')' });
      getChapters(b.id).forEach((ch, i) => {
        if (ch.title && ch.title.toLowerCase().includes(q.toLowerCase()))
          items.push({ type: 'chapter', icon: '📄', label: ch.title, sub: b.title, action: 'openChapter(' + b.id + ',' + i + ')' });
      });
    });
    posts.forEach(p => {
      if ((p.title || '').toLowerCase().includes(q.toLowerCase()) || (p.text || '').toLowerCase().includes(q.toLowerCase()))
        items.push({ type: 'blog', icon: '✍️', label: p.title || 'Без названия', sub: 'Блог', action: 'showSection(\'blog\')' });
    });
    if (!items.length) {
      res.innerHTML = '<div style="padding:16px 20px;color:var(--muted);font-size:0.9rem">Ничего не найдено</div>';
    } else {
      res.innerHTML = items.slice(0, 8).map(it =>
        '<div onclick="' + it.action + ';clearSearch()" style="display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;border-bottom:1px solid var(--divider);transition:background 0.2s" onmouseover="this.style.background=\'rgba(139,26,26,0.05)\'" onmouseout="this.style.background=\'\'">' +
        '<span style="font-size:1.2rem">' + it.icon + '</span>' +
        '<div><div style="font-size:0.95rem;color:var(--ink)">' + esc(it.label) + '</div><div style="font-size:0.78rem;color:var(--muted)">' + esc(it.sub) + '</div></div></div>'
      ).join('');
    }
    res.style.display = 'block';
  }, 200);
}
function clearSearch() {
  const inp = document.getElementById('search-input');
  const res = document.getElementById('search-results');
  const clear = document.getElementById('search-clear');
  if (inp) inp.value = '';
  if (res) res.style.display = 'none';
  if (clear) clear.style.display = 'none';
}
document.addEventListener('click', e => {
  if (!e.target.closest('#search-bar-wrap')) clearSearch();
});

// ═══ РЕАКЦИИ ═════════════════════════════════════
const REACTION_EMOJIS = ['❤️', '🔥', '😭', '😂', '😮'];
let _reactChapterId = null;
async function renderReactions(chapterId) {
  _reactChapterId = String(chapterId);
  const wrap = document.getElementById('chapter-reactions');
  if (!wrap) return;
  wrap.innerHTML = '<span style="font-size:0.8rem;color:var(--muted)">Загрузка реакций…</span>';
  const { data, error } = await sb.from('reactions').select('emoji,user_uid').eq('chapter_id', String(chapterId));
  if (error) { wrap.innerHTML = ''; return; }
  const counts = {};
  const mine = new Set();
  (data || []).forEach(r => {
    counts[r.emoji] = (counts[r.emoji] || 0) + 1;
    if (currentUser && String(r.user_uid) === String(currentUser.uid)) mine.add(r.emoji);
  });
  wrap.innerHTML = '<span style="font-size:0.8rem;color:var(--muted);margin-right:4px">Реакция:</span>' +
    REACTION_EMOJIS.map(em => {
      const cnt = counts[em] || 0;
      const active = mine.has(em);
      return '<button onclick="toggleReaction(\'' + em + '\')" style="border:1px solid ' + (active ? 'var(--red)' : 'var(--divider)') + ';background:' + (active ? 'rgba(139,26,26,0.08)' : 'transparent') + ';border-radius:20px;padding:5px 12px;cursor:pointer;font-size:1rem;color:var(--ink);transition:all 0.2s">' + em + (cnt ? ' <span style="font-size:0.78rem;color:var(--muted)">' + cnt + '</span>' : '') + '</button>';
    }).join('');
}
async function toggleReaction(emoji) {
  if (!currentUser) { openAuthModal('login'); return; }
  const cid = _reactChapterId;
  if (!cid) return;
  const uid = String(currentUser.uid);
  const { data: existing } = await sb.from('reactions').select('id').eq('chapter_id', cid).eq('user_uid', uid).eq('emoji', emoji).maybeSingle();
  if (existing) { await sb.from('reactions').delete().eq('id', existing.id); }
  else { await sb.from('reactions').insert({ chapter_id: cid, user_uid: uid, emoji }); }
  renderReactions(cid);
}

// ═══ СТАТИСТИКА ══════════════════════════════════
async function openStatsModal() {
  if (!currentUser) { openAuthModal('login'); return; }
  document.getElementById('stats-modal').classList.add('active');
  const modal = document.getElementById('stats-body');
  modal.innerHTML = '<div style="color:var(--muted);text-align:center;padding:24px">Загрузка…</div>';
  const books = getData('books', []);
  let totalChaps = 0, readChaps = 0;
  const bookRows = books.map(b => {
    const chs = getChapters(b.id);
    const prog = bookProgress(b.id);
    totalChaps += chs.length;
    readChaps += prog.read;
    const pct = chs.length ? Math.round(prog.read / chs.length * 100) : 0;
    return '<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;font-size:0.88rem;margin-bottom:4px"><span>' + esc(b.title) + '</span><span style="color:var(--muted)">' + prog.read + '/' + chs.length + '</span></div>' +
      '<div style="height:6px;background:var(--divider);border-radius:3px"><div style="height:6px;background:var(--red);border-radius:3px;width:' + pct + '%"></div></div></div>';
  }).join('');
  modal.innerHTML =
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px">' +
    '<div style="background:var(--card-bg);border:1px solid var(--divider);padding:16px;text-align:center"><div style="font-size:2rem;font-weight:bold;color:var(--red)">' + readChaps + '</div><div style="font-size:0.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em">Глав прочитано</div></div>' +
    '<div style="background:var(--card-bg);border:1px solid var(--divider);padding:16px;text-align:center"><div style="font-size:2rem;font-weight:bold;color:var(--red)">' + totalChaps + '</div><div style="font-size:0.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em">Глав всего</div></div>' +
    '</div>' +
    '<div style="font-size:0.75rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:12px">Прогресс по книгам</div>' +
    bookRows;
}

// ═══ УВЕДОМЛЕНИЯ ═════════════════════════════════
let _notifs = [];
async function loadNotifs() {
  if (!currentUser) return;
  try {
    const { data } = await sb.from('chapters').select('id,title,book_id,date,order').order('order', { ascending: false }).limit(20);
    if (!data) return;
    _notifs = data;
    const seenKey = 'notif_seen_' + currentUser.uid;
    const seenAt = parseInt(localStorage.getItem(seenKey) || '0');
    if (!seenAt) { localStorage.setItem(seenKey, Date.now()); return; }
    const lastSeenOrder = parseInt(localStorage.getItem('notif_last_order_' + currentUser.uid) || '0');
    const newCount = data.filter(c => (c.order || 0) > lastSeenOrder).length;
    const badge = document.getElementById('notif-badge');
    if (badge) {
      if (newCount > 0) { badge.textContent = newCount > 9 ? '9+' : newCount; badge.style.display = 'block'; }
      else { badge.style.display = 'none'; }
    }
  } catch (e) { console.warn('loadNotifs error:', e); }
}
async function openNotifModal() {
  if (!currentUser) { openAuthModal('login'); return; }
  document.getElementById('notif-modal').classList.add('active');
  const maxOrder = _notifs.length ? Math.max(..._notifs.map(c => c.order || 0)) : 0;
  localStorage.setItem('notif_seen_' + currentUser.uid, Date.now());
  localStorage.setItem('notif_last_order_' + currentUser.uid, maxOrder);
  const badge = document.getElementById('notif-badge');
  if (badge) badge.style.display = 'none';
  const body = document.getElementById('notif-body');
  const books = getData('books', []);
  if (!_notifs.length) { body.innerHTML = '<div style="color:var(--muted);padding:16px;text-align:center">Нет уведомлений</div>'; return; }
  body.innerHTML = _notifs.slice(0, 15).map(c => {
    const b = books.find(bk => bk.id == c.book_id) || {};
    return '<div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--divider);cursor:pointer" onclick="document.getElementById(\'notif-modal\').classList.remove(\'active\')">' +
      '<span style="font-size:1.4rem">📖</span>' +
      '<div style="flex:1"><div style="font-size:0.9rem;color:var(--ink)">' + esc(c.title || 'Новая глава') + '</div><div style="font-size:0.78rem;color:var(--muted)">' + esc(b.title || '') + (c.date ? ' · ' + esc(c.date) : '') + '</div></div></div>';
  }).join('');
}
function subscribeChapterNotifs() {
  if (!currentUser) return;
  if (_notifChannel) { sb.removeChannel(_notifChannel); _notifChannel = null; }
  try {
    _notifChannel = sb.channel('chapters-notif')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chapters' }, payload => {
        if (payload.new) { _notifs.unshift(payload.new); }
        const badge = document.getElementById('notif-badge');
        if (badge) {
          badge.style.display = 'block';
          const cur = parseInt(badge.textContent || '0');
          badge.textContent = cur + 1 > 9 ? '9+' : cur + 1;
        }
        loadSiteData(true); // принудительно обновляем данные
      }).subscribe();
  } catch (e) { console.warn('subscribeChapterNotifs error:', e); }
}
